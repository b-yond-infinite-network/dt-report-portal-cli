name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon runner
            target: macos-arm64
            artifact: rp-fetch-macos-arm64
          - os: macos-15-large    # Intel x86_64 runner (macos-13 deprecated)
            target: macos-x86_64
            artifact: rp-fetch-macos-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
            artifact: rp-fetch-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            artifact: rp-fetch-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Build executable
        run: |
          uv add --dev pyinstaller
          uv run pyinstaller rp-fetch.spec --noconfirm

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/rp-fetch dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: move dist\rp-fetch.exe dist\${{ matrix.artifact }}

      - name: Verify executable
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/${{ matrix.artifact }}
          dist/${{ matrix.artifact }} --version

      - name: Verify executable (Windows)
        if: runner.os == 'Windows'
        run: dist\${{ matrix.artifact }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rp-fetch-macos-arm64
            artifacts/rp-fetch-macos-x86_64
            artifacts/rp-fetch-linux-x86_64
            artifacts/rp-fetch-windows-x86_64.exe
