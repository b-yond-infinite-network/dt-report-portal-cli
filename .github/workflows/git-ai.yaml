name: Git AI

on:
  pull_request:
    types: [closed]

jobs:
  git-ai:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read

    steps:
      - name: Install git-ai
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/install.sh https://github.com/git-ai-project/git-ai/releases/latest/download/install.sh
          curl -fsSLo /tmp/SHA256SUMS https://github.com/git-ai-project/git-ai/releases/latest/download/SHA256SUMS
          cd /tmp && grep 'install.sh' SHA256SUMS | sha256sum -c -
          bash /tmp/install.sh
          echo "$HOME/.git-ai/bin" >> $GITHUB_PATH
      - name: Verify git-ai attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify "$HOME/.git-ai/bin/git-ai" --repo git-ai-project/git-ai
      - name: Run git-ai
        id: run-git-ai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git-ai ci github run
